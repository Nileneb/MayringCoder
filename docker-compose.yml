# MCP Memory Server — zwei Profile:
#   stdio: für Claude Code (lokal, kein Port, stdin/stdout)
#           docker compose --profile stdio up -d
#   http:  für Remote-Zugriff / app.linn.games (Port 8000, MCP_AUTH_TOKEN erforderlich)
#           MCP_AUTH_TOKEN=<secret> docker compose --profile http up -d

services:
  mcp-memory-stdio:
    profiles: ["stdio"]
    build: .
    stdin_open: true
    tty: true
    volumes:
      - ./cache:/app/cache
    env_file: .env
    environment:
      MCP_TRANSPORT: stdio
    restart: unless-stopped

  mcp-memory-http:
    profiles: ["http"]
    build: .
    ports:
      - "${MCP_HTTP_PORT:-8000}:8000"
    volumes:
      - ./cache:/app/cache
    env_file: .env
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_HOST: "0.0.0.0"
      MCP_HTTP_PORT: "8000"
    restart: unless-stopped
