services:
  mcp-memory-stdio:
    profiles: ["stdio"]
    build: .
    stdin_open: true
    tty: true
    volumes:
      - ./cache:/app/cache
    env_file: .env
    environment:
      MCP_TRANSPORT: stdio
    restart: unless-stopped

  mcp-memory-http:
    profiles: ["http"]
    build: .
    ports:
      - "${MCP_HTTP_PORT:-8000}:8000"
    volumes:
      - ./cache:/app/cache
    env_file: .env
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_HOST: "0.0.0.0"
      MCP_HTTP_PORT: "8000"
    restart: unless-stopped
