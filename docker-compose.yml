version: '3.8'

services:
  mcp-memory:
    build: .
    container_name: mcp-memory-server
    restart: unless-stopped

    # Persistence: SQLite + ChromaDB
    volumes:
      - ./cache:/app/cache

    # Load environment variables from .env
    env_file:
      - .env

    # Environment overrides
    environment:
      MCP_TRANSPORT: stdio
      PYTHONUNBUFFERED: "1"

    # For stdio transport (Claude Code integration)
    stdin_open: true
    tty: true

    # Resource limits (optional)
    # mem_limit: 2g
    # cpus: "2"

