name: Deploy to u-server

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (default: latest)"
        default: "latest"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: [self-hosted, u-server]

    steps:
      - name: Pull image and restart stack
        run: |
          docker pull nileneb/mayring:${{ inputs.tag || 'latest' }}
          cd ~/app.linn.games
          docker compose -f docker-compose.mayring.yml up -d
