name: Build & Push

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'docker/**'
      - 'requirements.txt'
      - 'prompts/**'
      - 'codebooks/**'
      - 'tools/**'
      - 'checker.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build image + trigger deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: |
            nileneb/mayring:latest
            nileneb/mayring:${{ github.sha }}
          cache-from: type=gha,scope=mayring
          cache-to: type=gha,mode=max,scope=mayring
          provenance: false
          sbom: false

      - name: Trigger deploy in app.linn.games
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'Nileneb',
              repo: 'app.linn.games',
              event_type: 'mayring-deploy',
              client_payload: { tag: '${{ github.sha }}' }
            });
            console.log('mayring-deploy event dispatched to app.linn.games');
