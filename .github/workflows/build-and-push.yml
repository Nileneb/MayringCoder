name: Deploy MayringCoder

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (default: latest)"
        default: "latest"

permissions:
  contents: read

jobs:
  deploy:
    name: Trigger deploy via app.linn.games runner
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deploy-mayring workflow in app.linn.games
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'Nileneb',
              repo: 'app.linn.games',
              workflow_id: 'deploy-mayring.yml',
              ref: 'main',
              inputs: {}
            });
            console.log('deploy-mayring.yml triggered in app.linn.games');
