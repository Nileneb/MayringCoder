name: mayring

# Standalone MayringCoder Stack — unabhängig vom app.linn.games Stack.
# Image wird lokal gebaut und nach Docker Hub gepusht (nileneb/mayring:latest).
# Verbindet sich über externes linn-shared Netzwerk mit Laravel (web) und Postgres.
#
# Einmalig auf dem Server:
#   docker network create linn-shared
#   docker volume create linn-mayring-cache
#
# Deploy:
#   ./deploy-mayring.sh

services:
  mayring-nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:${MAYRING_PORT:-6480}:80"
    volumes:
      - ./docker/nginx/mcp.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks: [mayring-internal, linn-shared]
    depends_on: [mayring-mcp, mayring-webui]

  mayring-api:
    image: nileneb/mayring:latest
    command: python -m uvicorn src.api.server:app --host 0.0.0.0 --port 8090
    ports:
      - "127.0.0.1:8090:8090"
    env_file: .env.production
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_HOST: "0.0.0.0"
      MCP_HTTP_PORT: "8090"
      LARAVEL_INTERNAL_URL: "http://web"
    volumes:
      - linn-mayring-cache:/app/cache
      - ./reports:/app/reports
      - ./secrets:/secrets:ro
    restart: unless-stopped
    networks: [mayring-internal, linn-shared]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mayring-mcp:
    image: nileneb/mayring:latest
    command: python -m src.api.mcp
    env_file: .env.production
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_HOST: "0.0.0.0"
      MCP_HTTP_PORT: "8092"
    volumes:
      - linn-mayring-cache:/app/cache:ro
      - ./secrets:/secrets:ro
    restart: unless-stopped
    networks: [mayring-internal]

  mayring-pi:
    image: nileneb/mayring:latest
    command: python -m src.agents.pi_server
    env_file: .env.production
    volumes:
      - linn-mayring-cache:/app/cache:ro
      - ./secrets:/secrets:ro
    restart: unless-stopped
    networks: [mayring-internal]

  mayring-webui:
    image: nileneb/mayring:latest
    command: python -m src.api.web_ui
    env_file: .env.production
    environment:
      LARAVEL_INTERNAL_URL: "http://web"
      GRADIO_ROOT_PATH: /ui
      GRADIO_SERVER_NAME: "0.0.0.0"
    volumes:
      - linn-mayring-cache:/app/cache:ro
      - ./secrets:/secrets:ro
    restart: unless-stopped
    networks: [mayring-internal]

  # Optional: incremental Claude-conversation ingestor (Issue #52).
  # Activate only on dev machines that have ~/.claude/projects:
  #   docker compose --profile watcher up -d mayring-watcher
  # Post-hook triggers /wiki/generate on the api so v2.0 layers stay fresh
  # without bouncing mayring-api.
  mayring-watcher:
    image: nileneb/mayring:latest
    profiles: ["watcher"]
    command:
      - python
      - -m
      - tools.conversation_watcher
      - --workspace-id
      - "system"
      - --hook-cmd
      - "curl -fsS -X POST -H 'Authorization: Bearer ${MCP_SERVICE_TOKEN}' -H 'Content-Type: application/json' -d '{\"repo\":\"${WATCHER_REPO:-}\"}' http://mayring-api:8090/wiki/generate >/dev/null"
      - --hook-interval
      - "1800"
    env_file: .env.production
    environment:
      CLAUDE_PROJECTS_DIR: "/host_claude"
    volumes:
      - linn-mayring-cache:/app/cache
      - ${CLAUDE_PROJECTS_DIR:-~/.claude/projects}:/host_claude:ro
    restart: unless-stopped
    networks: [mayring-internal]
    depends_on: [mayring-api]

networks:
  mayring-internal: {}
  linn-shared:
    external: true

volumes:
  linn-mayring-cache:
    external: true
