name: mayring

# Standalone MayringCoder Stack — unabhängig vom app.linn.games Stack.
# Image wird lokal gebaut und nach Docker Hub gepusht (nileneb/mayring:latest).
# Verbindet sich über externes linn-shared Netzwerk mit Laravel (web) und Postgres.
#
# Einmalig auf dem Server:
#   docker network create linn-shared
#   docker volume create linn-mayring-cache
#
# Deploy:
#   ./deploy-mayring.sh

services:
  mayring-nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:${MAYRING_PORT:-6480}:80"
    volumes:
      - ./docker/nginx/mcp.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks: [mayring-internal, linn-shared]
    depends_on: [mayring-mcp, mayring-webui]

  mayring-api:
    image: nileneb/mayring:latest
    command: python -m uvicorn src.api.server:app --host 0.0.0.0 --port 8090
    ports:
      - "127.0.0.1:8090:8090"
    env_file: .env.production
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_HOST: "0.0.0.0"
      MCP_HTTP_PORT: "8090"
      LARAVEL_INTERNAL_URL: "http://web"
    volumes:
      - linn-mayring-cache:/app/cache
      - ./reports:/app/reports
    restart: unless-stopped
    networks: [mayring-internal, linn-shared]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mayring-mcp:
    image: nileneb/mayring:latest
    command: python -m src.mcp_server
    env_file: .env.production
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_HOST: "0.0.0.0"
      MCP_HTTP_PORT: "8092"
    volumes:
      - linn-mayring-cache:/app/cache:ro
    restart: unless-stopped
    networks: [mayring-internal]

  mayring-pi:
    image: nileneb/mayring:latest
    command: python -m src.agents.pi_server
    env_file: .env.production
    volumes:
      - linn-mayring-cache:/app/cache:ro
    restart: unless-stopped
    networks: [mayring-internal]

  mayring-webui:
    image: nileneb/mayring:latest
    command: python -m src.api.web_ui
    env_file: .env.production
    environment:
      LARAVEL_INTERNAL_URL: "http://web"
      GRADIO_ROOT_PATH: /ui
      GRADIO_SERVER_NAME: "0.0.0.0"
    volumes:
      - linn-mayring-cache:/app/cache:ro
    restart: unless-stopped
    networks: [mayring-internal]

networks:
  mayring-internal: {}
  linn-shared:
    external: true

volumes:
  linn-mayring-cache:
    external: true
