# MayringCoder Production Stack
#
# Ollama läuft EXTERN (lokaler PC, OLLAMA_URL in .env.production)
# MySQL wird vom app.linn.games Docker-Stack geteilt (laravel_net)
#
# Start (aus Projekt-Root):
#   docker compose -f docker/docker-compose.production.yml --env-file .env.production up -d --build
#
# Logs:
#   docker compose -f docker/docker-compose.production.yml logs -f
#
# Stop:
#   docker compose -f docker/docker-compose.production.yml down

services:

  # ── FastAPI: Multi-Tenant API + Sanctum Auth ──────────────────────────────
  api-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python -m uvicorn src.api_server:app --host 0.0.0.0 --port 8080 --workers 2
    ports:
      - "127.0.0.1:8080:8080"
    env_file: ../.env.production
    volumes:
      - ../cache:/app/cache
      - ../reports:/app/reports
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - default
      - laravel_net    # MySQL-Zugriff für Sanctum-Token-Validierung

  # ── MCP Memory Server (HTTP-Modus für Laravel-Integration) ───────────────
  mcp-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python -m src.mcp_server
    ports:
      - "127.0.0.1:8090:8090"
    env_file: ../.env.production
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_HOST: "0.0.0.0"
      MCP_HTTP_PORT: "8090"
    volumes:
      - ../cache:/app/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Pi Agent REST Server (für Laravel CLAUDE_USE_OLLAMA_WORKERS) ─────────
  pi-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python pi_server.py
    ports:
      - "127.0.0.1:8091:8091"
    env_file: ../.env.production
    environment:
      PI_PORT: "8091"
    volumes:
      - ../cache:/app/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8091/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Gradio Web-UI (kommerzieller Zugang, Basic Auth) ─────────────────────
  web-ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ui
    command: >
      python -m src.web_ui
      --host 0.0.0.0
      --port 7860
      --auth ${UI_AUTH_USER:-admin}:${UI_AUTH_PASS}
    ports:
      - "127.0.0.1:7860:7860"
    env_file: ../.env.production
    volumes:
      - ../cache:/app/cache
      - ../reports:/app/reports
    restart: unless-stopped

# ── Persistente Volumes ────────────────────────────────────────────────────
volumes:
  cache:

# ── Netzwerke ──────────────────────────────────────────────────────────────
networks:
  # Geteiltes Netzwerk mit app.linn.games Docker-Stack (für MySQL-Zugriff)
  # Namen herausfinden: docker network ls | grep linn
  laravel_net:
    external: true
    name: ${LARAVEL_NETWORK:-app_linn_games_default}
