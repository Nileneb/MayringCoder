# MayringCoder Full Pipeline Docker Compose
#
# Includes Ollama, model-pull, analyzer, web-ui, and MCP memory server.
#
# Usage:
#   Start all services:
#     docker compose -f docker-compose.full.yml up -d
#
#   Run analysis:
#     docker compose -f docker-compose.full.yml run analyzer python checker.py --repo <URL>
#
#   View logs:
#     docker compose -f docker-compose.full.yml logs -f analyzer
#
#   Stop all services:
#     docker compose -f docker-compose.full.yml down

version: "3.8"

volumes:
  ollama_models:

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 5
    # Uncomment for GPU support (NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  model-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: /bin/sh
    command: -c "ollama pull ${OLLAMA_MODEL:-llama3.1:8b}"
    volumes:
      - ollama_models:/root/.ollama
    restart: "no"
    env_file: .env

  analyzer:
    build: .
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./cache:/app/cache
      - ./reports:/app/reports
    env_file: .env
    environment:
      OLLAMA_URL: http://ollama:11434
      MCP_TRANSPORT: stdio
    command: sleep infinity
    restart: on-failure

  web-ui:
    build: .
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "${GRADIO_PORT:-7860}:7860"
    volumes:
      - ./cache:/app/cache
      - ./reports:/app/reports
    env_file: .env
    environment:
      OLLAMA_URL: http://ollama:11434
    command: python -m src.web_ui
    restart: on-failure

  mcp-memory:
    build: .
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "${MCP_HTTP_PORT:-8000}:8000"
    volumes:
      - ./cache:/app/cache
    env_file: .env
    environment:
      OLLAMA_URL: http://ollama:11434
      MCP_TRANSPORT: http
      MCP_HTTP_HOST: "0.0.0.0"
      MCP_HTTP_PORT: "8000"
    restart: unless-stopped
