name: mayringcoder

# Profile:
#   dev        — alle Services (externes Ollama)
#                docker compose --profile dev up -d --build
#   production — alle Services + Sanctum-Auth + laravel_net
#                docker compose --profile production --env-file ../.env.production up -d --build
#   full       — alle Services + eingebettetes Ollama (self-contained)
#                docker compose --profile full up -d --build

services:
  mayringcoder:
    profiles: [dev, production, full]
    build: { context: .., dockerfile: docker/Dockerfile }
    command: python -m src.main
    ports:
      - "127.0.0.1:7860:7860"   # Web UI
      - "127.0.0.1:8080:8080"   # API
      - "127.0.0.1:8090:8090"   # MCP (HTTP/SSE)
      - "127.0.0.1:8091:8091"   # Pi-Agent
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_HOST: "0.0.0.0"
      MCP_HTTP_PORT: "8090"
      API_URL: "http://localhost:8080"
    env_file: ../.env.production
    volumes:
      - ../cache:/app/cache
      - ../reports:/app/reports
    restart: unless-stopped
    networks: [mayring, laravel_net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Ollama nur für lokale Entwicklung (full-Profil).
  # Produktion: Ollama läuft auf three.linn.games — nie hier deployen.
  ollama:
    profiles: [full]
    image: ollama/ollama:latest
    ports: ["127.0.0.1:11434:11434"]
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    networks: [mayring]

networks:
  mayring: {}
  laravel_net:
    external: true
    name: ${LARAVEL_NETWORK:-app_linn_games_default}

volumes:
  ollama_models: {}
