# ---------------------------------------------------------------------------
# Exclude-Patterns — Dateien, die VOR der Analyse herausgefiltert werden.
# Glob-Syntax (* = Segment, ** = beliebig tief) oder re:... für Regex.
# ---------------------------------------------------------------------------
exclude_patterns:
  # 1. Build-Artefakte & kompilierter Code
  - "*/dist/*"
  - "*/build/*"
  - "*/out/*"
  - "*/output/*"
  - "*.min.js"
  - "*.min.css"
  - "*.bundle.js"
  - "*.chunk.js"
  - "*.map"

  # 2. Paketmanager & Lock-Files
  - "*.lock"
  - "package-lock.json"
  - "yarn.lock"
  - "pnpm-lock.yaml"
  - "composer.lock"
  - "Gemfile.lock"
  - "poetry.lock"
  - "Pipfile.lock"
  - "go.sum"
  - "Cargo.lock"

  # 3. Abhängigkeits-Verzeichnisse
  - "*/node_modules/*"
  - "*/vendor/*"
  - "*/.venv/*"
  - "*/venv/*"
  - "*/__pycache__/*"
  - "*/.tox/*"
  - "*/site-packages/*"

  # 4. Generierte / Framework-eigene Assets
  - "public/js/*"
  - "public/css/*"
  - "public/fonts/*"
  - "public/build/*"
  - "public/hot"
  - "*/storage/framework/*"
  - "*/@generated*"
  - "*/.generated/*"
  - "*/auto-generated/*"

  # 5. Dokumentation & Markdown — kein Code, keine Analyse nötig
  - "README*"
  - "readme*"
  - "CHANGELOG*"
  - "changelog*"
  - "CONTRIBUTING*"
  - "contributing*"
  - "LICENSE*"
  - "license*"
  - "NOTICE*"
  - "AUTHORS*"
  - "SECURITY*"
  - "CODE_OF_CONDUCT*"
  - "*.md"
  - "*.rst"
  - "*.txt"
  - "*/docs/*"
  - "*/doc/*"
  - "*/.github/*"

  # 6. Binärdateien & Medien
  - "*.png"
  - "*.jpg"
  - "*.jpeg"
  - "*.gif"
  - "*.ico"
  - "*.svg"
  - "*.webp"
  - "*.bmp"
  - "*.woff"
  - "*.woff2"
  - "*.ttf"
  - "*.eot"
  - "*.otf"
  - "*.pdf"
  - "*.zip"
  - "*.tar"
  - "*.gz"
  - "*.rar"
  - "*.exe"
  - "*.dll"
  - "*.so"
  - "*.dylib"
  - "*.pyc"
  - "*.pyo"
  - "*.class"
  - "*.o"
  - "*.a"
  - "*.wasm"
  - "*.sqlite"
  - "*.sqlite3"
  - "*.db"

  # 6. IDE & Tooling
  - "*/.idea/*"
  - "*/.vscode/*"
  - "*/.vs/*"
  - "*/.eclipse/*"
  - "*.swp"
  - "*.swo"
  - "*~"
  - ".DS_Store"
  - "Thumbs.db"

  # 7. CI/CD-Caches & temporäre Verzeichnisse
  - "*/.cache/*"
  - "*/.tmp/*"
  - "*/.temp/*"
  - "*/tmp/*"
  - "*/coverage/*"
  - "*/.nyc_output/*"
  - "*/.pytest_cache/*"
  - "*/.phpunit.cache/*"

  # 8. Dokumentation & statische Seiten (generiert)
  - "*/docs/_build/*"
  - "*/docs/api/*"
  - "*/.docusaurus/*"
  - "*/_site/*"

  # 9. Laravel: generierte / boilerplate Dateien — Parse-Fehler ohne Mehrwert
  # Blade-Templates sind HTML+PHP-Mix, kein reiner Code
  - "*.blade.php"
  - "*/resources/views/*"
  # Migrationen: SQL-Boilerplate, Schema-Definitionen ohne Logik
  - "*/database/migrations/*"
  # Factories & Seeders: Test-Fixtures, kein Produktionscode
  - "*/database/factories/*"
  - "*/database/seeders/*"
  # Konfigurationsdateien: meist nur Arrays/Konstanten
  - "config/*.php"
  - "*.env"
  - ".env*"
  - "*.env.example"

# ---------------------------------------------------------------------------
# Kategorien — Mayring Stufe 1: Strukturierung
# ---------------------------------------------------------------------------
categories:
  - name: api
    description: API-Endpunkte, Routes, Controller, REST/GraphQL/gRPC-Handler
    patterns:
      - "*/api/*"
      - "*/routes/*"
      - "*/controllers/*"
      - "*/endpoints/*"
      - "*route*.py"
      - "*controller*.py"
      - "*endpoint*.py"
      - "*handler*.py"
      - "*/graphql/*"
      - "*/grpc/*"

  - name: data_access
    description: Datenbankzugriff, ORM-Modelle, Migrations, Repositories
    patterns:
      - "*/models/*"
      - "*/db/*"
      - "*/database/*"
      - "*/migrations/*"
      - "*/repositories/*"
      - "*model*.py"
      - "*schema*.py"
      - "*migration*.py"
      - "*repository*.py"
      - "*dao*.py"

  - name: domain
    description: Business-Logik, Domain-Services, Use Cases
    patterns:
      - "*/services/*"
      - "*/domain/*"
      - "*/usecases/*"
      - "*/use_cases/*"
      - "*service*.py"
      - "*usecase*.py"
      - "*business*.py"

  - name: infrastructure
    description: Background-Jobs, Queue-Worker, Cron-Commands, Console-Commands
    patterns:
      - "*/Jobs/*"
      - "*/jobs/*"
      - "*/Commands/*"
      - "*/commands/*"
      - "*/Console/*"
      - "*Job.php"
      - "*Command.php"
      - "*job*.py"
      - "*worker*.py"
      - "*task*.py"
      - "*queue*.py"

  - name: auth
    description: Authentifizierung, Autorisierung, Policies, Guards
    patterns:
      - "*/Policies/*"
      - "*/policies/*"
      - "*/Guards/*"
      - "*/guards/*"
      - "*Policy.php"
      - "*Guard.php"
      - "*auth*.py"
      - "*permission*.py"
      - "*authorization*.py"

  - name: middleware
    description: HTTP-Middleware, Request/Response-Pipeline, Token-Prüfung
    patterns:
      - "*/Middleware/*"
      - "*/middleware/*"
      - "*Middleware.php"
      - "*middleware*.py"
      - "*interceptor*.py"

  - name: providers
    description: Service Provider, Dependency Injection, Boot-Logik
    patterns:
      - "*/Providers/*"
      - "*/providers/*"
      - "*Provider.php"
      - "*ServiceProvider.php"
      - "*provider*.py"

  - name: listeners
    description: Event Listener, Subscriber, Webhooks, Observer
    patterns:
      - "*/Listeners/*"
      - "*/listeners/*"
      - "*/Observers/*"
      - "*/observers/*"
      - "*Listener.php"
      - "*Observer.php"
      - "*listener*.py"
      - "*subscriber*.py"
      - "*event_handler*.py"

  - name: ui
    description: Frontend, Templates, UI-Komponenten, Views
    patterns:
      - "*.html"
      - "*.jsx"
      - "*.tsx"
      - "*.vue"
      - "*.svelte"
      - "*/templates/*"
      - "*/components/*"
      - "*/pages/*"
      - "*/views/*"
      - "*view*.py"

  - name: config
    description: Konfiguration, Settings, Environment-Handling
    patterns:
      - "*config*.py"
      - "*settings*.py"
      - "*.yaml"
      - "*.yml"
      - "*.toml"
      - "*.ini"
      - "*.cfg"
      - ".env*"
      - "*/config/*"

  - name: utils
    description: Hilfsfunktionen, Utilities, Helpers, Mixins
    patterns:
      - "*util*.py"
      - "*helper*.py"
      - "*mixin*.py"
      - "*common*.py"
      - "*/utils/*"
      - "*/helpers/*"

  - name: tests
    description: Unit-Tests, Integrationstests, Fixtures
    patterns:
      - "test_*.py"
      - "*_test.py"
      - "*/tests/*"
      - "*/test/*"
      - "conftest.py"
      - "*/fixtures/*"

  - name: integration
    description: Externe API-Aufrufe, SDK-Wrapper, Third-Party-Services
    patterns:
      - "*/Integrations/*"
      - "*/integration/*"
      - "*/integrations/*"
      - "*Client.php"
      - "*client*.py"
      - "*integration*.py"
      - "*connector*.py"
      - "*/adapters/*"
      - "*/adaptor/*"

  - name: caching
    description: Cache-Logik, Invalidierung, TTL-Management, Redis/Memcached
    patterns:
      - "*/Cache/*"
      - "*/cache/*"
      - "*Cache.php"
      - "*cache*.py"
      - "*redis*.py"
      - "*memcache*.py"

  - name: logging
    description: Log-Statements, Monitoring, Metrics, Tracing, Alerting
    patterns:
      - "*/Logging/*"
      - "*/logging/*"
      - "*Logger.php"
      - "*logger*.py"
      - "*logging*.py"
      - "*monitoring*.py"
      - "*tracing*.py"

  - name: validation
    description: Input-Validierung, Form Requests, Sanitization, Schemas
    patterns:
      - "*/Requests/*"
      - "*/requests/*"
      - "*/validators/*"
      - "*/validation/*"
      - "*Request.php"
      - "*validator*.py"
      - "*validation*.py"

  - name: serialization
    description: JSON/XML-Transformation, DTOs, Resources, Presenter, Transformer
    patterns:
      - "*/Resources/*"
      - "*/Transformers/*"
      - "*/Presenters/*"
      - "*/serializers/*"
      - "*Resource.php"
      - "*transformer*.py"
      - "*serializer*.py"
      - "*dto*.py"

  - name: error_handling
    description: Exception-Handler, Fallback-Logik, Retry-Mechanismen
    patterns:
      - "*/Exceptions/*"
      - "*/exceptions/*"
      - "*Exception.php"
      - "*exception*.py"
      - "*error_handler*.py"
      - "*fallback*.py"
      - "*retry*.py"

  - name: security
    description: Encryption, Hashing, CSRF, Rate-Limiting, Sanitization
    patterns:
      - "*/Security/*"
      - "*/security/*"
      - "*encrypt*.py"
      - "*decrypt*.py"
      - "*hash*.py"
      - "*csrf*.py"
      - "*ratelimit*.py"
      - "*sanitize*.py"

  - name: scheduling
    description: Cron-Jobs, Task-Scheduling, zeitgesteuerte Abläufe
    patterns:
      - "*/Console/Commands/*"
      - "*/Schedule/*"
      - "*/schedule/*"
      - "*schedule*.py"
      - "*cron*.py"
      - "*scheduled_task*.py"

  - name: temp_dummy
    description: Temporärer Code, Dummy-Implementierungen, Placeholder
    patterns:
      - "*tmp*"
      - "*temp*"
      - "*dummy*"
      - "*placeholder*"
      - "*scaffold*"
      - "*stub*"
      - "*.bak"
      - "*_old.*"
      - "*_backup.*"
