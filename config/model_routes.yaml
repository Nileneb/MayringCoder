# MayringCoder Model Router Configuration
# Maps each task type to a specific Ollama model.
# Change at runtime via the Web-UI Einstellungen tab — NOT via OLLAMA_MODEL env var.

mayring_code:
  model: "mayring-qwen3:2b"
  fallback: "qwen2.5-coder:7b"
  timeout: 240

mayring_social:
  model: "mayring-qwen3:2b"
  fallback: "mistral:7b-instruct"
  timeout: 240

mayring_hybrid:
  model: "mayring-qwen3:2b"
  fallback: "mistral:7b-instruct"
  timeout: 240

vision:
  model: "qwen2.5vl:3b"
  fallback: ""
  timeout: 120

analysis:
  model: "mayring-qwen3:2b"
  fallback: "qwen2.5-coder:7b"
  timeout: 240

embedding:
  model: "nomic-embed-text"
  fallback: "nomic-embed-text"
  timeout: 60
