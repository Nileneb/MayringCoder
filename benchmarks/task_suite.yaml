  # --- PICO: strukturierte Suchstring-Generierung ---
  - id: pico_01
    category: pico
    task: "Erstelle einen vollständigen PICO-Suchstring für: Wirkt kognitive Verhaltenstherapie (CBT) bei Erwachsenen mit sozialer Angststörung?"
    expected_keywords: ["CBT", "kognitive", "Angststörung", "Population", "Intervention"]
