      - "issue/118"
    view: fact
    description: "P6 Agent DB-Fehler"

  - id: q09
    query: "P4 Agent liefert nur Bestätigungstext statt Suchstrings"
    relevant_paths:
      - "issue/120"
    view: fact
    description: "P4 Agent falsches Ausgabeformat"

  - id: q10
    query: "Agenten-UUIDs existieren nicht in Langdock Timeouts"
    relevant_paths:
      - "issue/131"
    view: fact
    description: "Langdock UUID-Mismatch verursacht Timeouts"

  # --- Impl / Komponenten / Codestruktur ---

  - id: q11
