  - id: q19
    query: "Architektur Umstellung API MCP-Server Markdown RAG"
    relevant_paths:
      - "issue/156"
      - "issue/159"
    view: decision
    description: "Architektur-Entscheidung: API → MCP + Langdock-Integration"

  - id: q20
