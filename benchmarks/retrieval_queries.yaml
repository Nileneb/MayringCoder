# Benchmark-Queries für Nileneb/app.linn.games Issues
# Format:
#   query: Natürlichsprachige Suchanfrage
#   relevant_paths: Liste bekannter relevanter Issue-Pfade (für MRR/Recall-Berechnung)
#   view: Optional — gezielte View-Ebene (fact, impl, decision, entities, full)
#   description: Beschreibung des Benchmark-Fokus

queries:

  # --- Bugs / fact-heavy ---

  - id: q01
    query: "Credit-Limit täglich Agenten-Nutzung Race Condition"
    relevant_paths:
      - "issue/133"
      - "issue/147"
    view: fact
    description: "Bugs rund um CreditService und AgentDailyLimit"

  - id: q02
    query: "AgentResultStorageService readResult deleteResult Datei nicht gefunden"
    relevant_paths:
      - "issue/144"
    view: fact
    description: "Bug: StorageService findet gespeicherte Dateien nicht"

  - id: q03
    query: "GitHub Actions CI-Tests scheitern nach Push"
    relevant_paths:
      - "issue/152"
    view: fact
    description: "CI-Pipeline Fehler nach Push"

  - id: q04
    query: "TriggersPhaseAgent projekt_id user_id fehlt Context Production"
    relevant_paths:
      - "issue/154"
    view: fact
    description: "Bug: Agenten ohne Kontext in Production"

  - id: q05
    query: "P2 schwarzes 500er Popup Fehler"
    relevant_paths:
      - "issue/119"
      - "issue/111"
    view: fact
    description: "500er Fehler im P2 Review-Flow"

  - id: q06
    query: "P3 Agent startet nicht keine Reaktion beim Klick"
